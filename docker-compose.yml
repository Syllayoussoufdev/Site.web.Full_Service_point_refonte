services:
  app:
    build: .
    container_name: fsp_app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    networks:
      - fsp-net

  db:
    image: mysql:8.0
    container_name: fsp_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fullservicepoint
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    volumes:
      - fsp-db:/var/lib/mysql
    networks:
      - fsp-net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: fsp_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
    networks:
      - fsp-net

  node:
    image: node:20-alpine
    container_name: fsp_node
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    tty: true
    networks:
      - fsp-net

networks:
  fsp-net:
volumes:
  fsp-db: