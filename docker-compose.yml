services:
  app:
    build: ./docker/php
    container_name: fsp_app
    volumes:
      - ./:/var/www
    networks:
      - fsp-net

  nginx:
    image: nginx:alpine
    container_name: fsp_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - fsp-net

  db:
    image: mysql:8.0
    container_name: fsp_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fullservicepoint
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    volumes:
      - fsp-db:/var/lib/mysql
    networks:
      - fsp-net

  node:
    image: node:20-alpine
    container_name: fsp_node
    working_dir: /var/www
    volumes:
      - ./:/var/www
    tty: true
    networks:
      - fsp-net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: fsp_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db
    networks:
      - fsp-net

networks:
  fsp-net:

volumes:
  fsp-db: